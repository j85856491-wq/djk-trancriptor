# ============================================================
# DJK Transcriptor - Build Manuel
# Developed by Etienne Tech
#
# Permet de lancer un build manuellement depuis l'onglet Actions
# ============================================================

name: 🔧 Build Manuel

on:
  workflow_dispatch:
    inputs:
      build_debug:
        description: 'Build Debug APK'
        required: false
        default: true
        type: boolean
      build_release:
        description: 'Build Release APK'
        required: false
        default: true
        type: boolean
      run_tests:
        description: 'Lancer les tests unitaires'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: 🔧 Build Manuel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔐 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🧪 Run Tests
        if: ${{ inputs.run_tests }}
        run: ./gradlew test --stacktrace --no-daemon

      - name: 🔨 Build Debug APK
        if: ${{ inputs.build_debug }}
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: 🔨 Build Release APK
        if: ${{ inputs.build_release }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: 📤 Upload Debug APK
        if: ${{ inputs.build_debug }}
        uses: actions/upload-artifact@v4
        with:
          name: DJK-Transcriptor-Debug-Manual
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: 📤 Upload Release APK
        if: ${{ inputs.build_release }}
        uses: actions/upload-artifact@v4
        with:
          name: DJK-Transcriptor-Release-Manual
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: 📋 Build Summary
        if: always()
        run: |
          echo "## 🔧 Build Manuel" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Paramètre | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK | ${{ inputs.build_debug }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release APK | ${{ inputs.build_release }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ inputs.run_tests }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*DJK Transcriptor - Etienne Tech*" >> $GITHUB_STEP_SUMMARY
