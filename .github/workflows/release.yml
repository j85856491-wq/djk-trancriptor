# ============================================================
# DJK Transcriptor - Release Workflow
# Developed by Etienne Tech
#
# Ce workflow se déclenche quand tu crées un tag v*.*.*
# Il build les APK et crée automatiquement une GitHub Release
# ============================================================

name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

# Permissions nécessaires pour créer une release
permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1 : Build + Release
  # ==========================================
  release:
    name: 🚀 Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # --- Étape 1 : Récupérer le code ---
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Étape 2 : Configurer Java 17 ---
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # --- Étape 3 : Permissions gradlew ---
      - name: 🔐 Grant execute permission for gradlew
        run: chmod +x gradlew

      # --- Étape 4 : Cache Gradle ---
      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # --- Étape 5 : Extraire la version du tag ---
      - name: 🏷️ Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version détectée : $VERSION"

      # --- Étape 6 : Build Debug APK ---
      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      # --- Étape 7 : Build Release APK ---
      - name: 🔨 Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      # --- Étape 8 : Vérifier les APK ---
      - name: ✅ Verify APK files
        run: |
          echo "=== APK générés ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
          echo ""
          echo "=== Tailles ==="
          for apk in $(find app/build/outputs/apk -name "*.apk"); do
            size=$(ls -lh "$apk" | awk '{print $5}')
            echo "📱 $(basename $apk) : $size"
          done

      # --- Étape 9 : Renommer les APK ---
      - name: 📝 Rename APK files
        run: |
          mkdir -p release-artifacts
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp app/build/outputs/apk/debug/app-debug.apk \
               "release-artifacts/DJK-Transcriptor-v${{ steps.version.outputs.VERSION }}-debug.apk"
          fi
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp app/build/outputs/apk/release/app-release.apk \
               "release-artifacts/DJK-Transcriptor-v${{ steps.version.outputs.VERSION }}-release.apk"
          fi
          echo "=== Fichiers prêts ==="
          ls -lh release-artifacts/

      # --- Étape 10 : Créer la GitHub Release ---
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          name: "🎤 DJK Transcriptor v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🎤 DJK Transcriptor v${{ steps.version.outputs.VERSION }}

            **Application Android de contrôle vocal avancée**
            Développé par **Etienne Tech**

            ---

            ### 📱 Fonctionnalités
            - 🗣️ **Contrôle vocal** — Parlez pour contrôler votre téléphone
            - 📱 **Gestion d'apps** — Ouvrir/Fermer des applications par la voix
            - 📂 **Fichiers** — Supprimer, lister des fichiers
            - 🎬 **Médias** — Lancer vidéos et musique
            - 📞 **Communication** — Appeler des contacts, envoyer des SMS
            - ⚙️ **Système** — Bluetooth, WiFi, Volume, Lampe, Batterie
            - 🔍 **Recherche** — Recherche web vocale
            - 🌍 **Bilingue** — Français et Anglais

            ### 📦 Installation
            1. Téléchargez l'APK ci-dessous
            2. Activez "Sources inconnues" sur votre téléphone
            3. Installez l'APK
            4. Autorisez le microphone et le stockage

            ### 📋 Fichiers inclus
            | Fichier | Description |
            |---------|-------------|
            | `DJK-Transcriptor-v${{ steps.version.outputs.VERSION }}-debug.apk` | Version Debug (pour test) |
            | `DJK-Transcriptor-v${{ steps.version.outputs.VERSION }}-release.apk` | Version Release (optimisée) |

            ---

            ### 🏗️ Infos techniques
            - **Package** : `com.etienetech.djktranscriptor`
            - **Min SDK** : Android 7.0 (API 24)
            - **Target SDK** : Android 14 (API 34)
            - **Architecture** : Kotlin + Material Design 3

            ---

            *Powered by Etienne Tech* 🚀
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Étape 11 : Upload Artifacts ---
      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DJK-Transcriptor-v${{ steps.version.outputs.VERSION }}
          path: release-artifacts/*.apk
          retention-days: 90
          if-no-files-found: warn

      # --- Étape 12 : Résumé ---
      - name: 📋 Release Summary
        if: always()
        run: |
          echo "## 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | v${{ steps.version.outputs.VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 APK générés" >> $GITHUB_STEP_SUMMARY
          for apk in release-artifacts/*.apk 2>/dev/null; do
            if [ -f "$apk" ]; then
              size=$(ls -lh "$apk" | awk '{print $5}')
              echo "- ✅ \`$(basename $apk)\` — $size" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*DJK Transcriptor - Etienne Tech*" >> $GITHUB_STEP_SUMMARY
