name: Release DJK Transcriptor

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          name: DJK Transcriptor v${{ steps.version.outputs.VERSION }}
          body: |
            ## DJK Transcriptor v${{ steps.version.outputs.VERSION }}

            ### 🎤 Voice Control Android App
            Developed by **Etienne Tech**

            ### Installation
            1. Download the APK file below
            2. Enable "Install from unknown sources" on your device
            3. Open the APK to install
            4. Grant microphone and storage permissions

            ### What's New
            - Professional voice command interface
            - Open/close apps by voice
            - File management commands
            - Media playback control
            - Contact management
            - System controls (WiFi, Bluetooth, volume, etc.)
            - Natural French & English language support

            ---
            *Powered by Etienne Tech*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DJK-Transcriptor-v${{ steps.version.outputs.VERSION }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          retention-days: 90
